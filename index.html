<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список HTML страниц</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        font-family: 'Manrope', sans-serif;
        background-color: var(--light-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 20px;
        padding-top: 40px;
        padding-bottom: 40px;
    }

    h2 {
        font-family: 'Manrope', sans-serif;
        font-style: normal;
        font-weight: 600;
        font-size: 56px;
        line-height: 65px;
        text-align: center;
        text-transform: uppercase;
        color: #2C3E50;
        margin-bottom: 40px;
    }

    .list-pages {
        list-style-type: none;
        padding: 0;
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .tab-btn {
        display: inline-block;
        padding: 15px 30px;
        font-family: 'Manrope', sans-serif;
        font-weight: 500;
        font-size: 20px;
        text-decoration: none;
        border: 2px solid #2C3E50;
        border-radius: 36px;
        color: #2C3E50;
        transition: all 0.3s ease;
        text-align: center;
    }

    .tab-btn:hover {
        background-color: #2C3E50;
        color: white;
    }
</style>
<body>
    <div class="container">
        <h2>Доступные страницы</h2>
        <ul class="list-pages">
            <li style="margin-bottom: 10px;"><a target="_blank" class="tab-btn btn-transparent" href="about.html">О компании</a></li>
            <li style="margin-bottom: 10px;"><a target="_blank" class="tab-btn btn-transparent" href="publications.html">Новости и статьи</a></li>
              <li style="margin-bottom: 10px;"><a target="_blank" class="tab-btn btn-transparent" href="faq.html">FAQ</a></li>
        </ul>
    </div>
</body>
</html>
